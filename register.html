<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — FlowerShop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a href="index.html">
                <img src="img/logo.jpg"
                     class="img-fluid rounded navbar-brand"
                     alt="Logo"
                     style="height: 100px;">
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>

                <span id="nav-user-name" class="nav-user-name me-2" hidden></span>
                <a id="nav-login-btn" href="login.html" class="btn btn-outline-primary me-2">Login</a>
                <a id="nav-profile-link" href="login.html" class="ms-3 text-dark nav-icon-link" aria-label="Профиль">
                    <i class="bi bi-person-circle"></i>
                </a>
            </div>
        </div>
    </nav>
</header>

<main class="auth-page">
    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <img src="img/logo.jpg" alt="Murmur">
        </a>

        <h1 class="auth-title">Регистрация</h1>
        <p class="auth-subtitle">Создайте аккаунт для заказа букетов</p>

        <div id="auth-message" class="auth-alert" hidden></div>

        <form id="register-form" class="auth-form" novalidate>
            <div class="mb-3">
                <label for="name" class="form-label">Имя</label>
                <input type="text"
                       class="form-control"
                       id="name"
                       name="name"
                       placeholder="Анна"
                       required
                       minlength="2">
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email"
                       class="form-control"
                       id="email"
                       name="email"
                       placeholder="name@example.com"
                       required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       placeholder="минимум 6 символов"
                       required
                       minlength="6">
            </div>

            <div class="mb-4">
                <label for="confirm" class="form-label">Повторите пароль</label>
                <input type="password"
                       class="form-control"
                       id="confirm"
                       name="confirm"
                       placeholder="••••••••"
                       required
                       minlength="6">
            </div>

            <button type="submit" class="btn btn-primary w-100 auth-submit">Зарегистрироваться</button>
        </form>

        <p class="auth-footer-text">
            Уже есть аккаунт?
            <a href="login.html" class="auth-link">Войти</a>
        </p>

        <a href="index.html" class="auth-back">
            <i class="bi bi-arrow-left"></i> На главную
        </a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
</body>
</html>
