<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Помощь</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-4">Форма обратной связи</h1>

    <div class="auth-card mx-auto">

        <form>

            <div class="mb-3">
                <label>Ваш адрес</label>
                <input type="text"
                       class="form-control"
                       placeholder="Введите email или адрес">
            </div>

            <div class="mb-3">
                <label>Описание ситуации</label>
                <textarea class="form-control"
                          rows="5"
                          placeholder="Опишите проблему"></textarea>
            </div>

            <button class="btn btn-primary w-100">
                Отправить
            </button>

        </form>

        <a href="index.html" class="auth-back">
            ← На главную
        </a>

    </div>
</div>

</body>
</html>
