<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <a href="staff-login.html" class="auth-back">
        ← Назад
    </a>
    <h1 class="text-center mb-5">Панель менеджера</h1>

    <div class="card p-4 mb-4">
        <h3>Изменить новости</h3>
        <textarea class="form-control" rows="4"
                  placeholder="Новый текст новости"></textarea>
    </div>

    <div class="card p-4 mb-4">
        <h3>Изменить отзывы</h3>
        <textarea class="form-control" rows="4"
                  placeholder="Новый отзыв"></textarea>
    </div>

    <div class="card p-4">
        <h3>Изменить футер</h3>
        <textarea class="form-control" rows="4"
                  placeholder="Новый текст футера"></textarea>
    </div>

</div>

</body>
</html>
