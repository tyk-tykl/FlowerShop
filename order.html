<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа — FlowerShop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a href="index.html">
                <img src="img/logo.jpg"
                     class="img-fluid rounded navbar-brand"
                     alt="Logo"
                     style="height: 100px;">
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>

                <span id="nav-user-name" class="nav-user-name me-2" hidden></span>
                <a id="nav-login-btn" href="login.html" class="btn btn-outline-primary me-2">Login</a>
                <a id="nav-profile-link" href="profile.html" class="ms-3 text-dark nav-icon-link" aria-label="Профиль">
                    <i class="bi bi-person-circle"></i>
                </a>
            </div>
        </div>
    </nav>
</header>

<main class="auth-page">
    <div class="auth-card order-card">
        <a href="index.html#bouquets" class="auth-back order-back">
            <i class="bi bi-arrow-left"></i> Назад к букетам
        </a>

        <h1 class="auth-title">Оформление заказа</h1>

        <div id="order-bouquet-preview" class="order-bouquet-preview"></div>

        <div id="order-message" class="auth-alert" hidden></div>

        <form id="order-form" class="auth-form" novalidate>
            <div class="mb-3">
                <label for="address" class="form-label">Адрес доставки</label>
                <input type="text"
                       class="form-control"
                       id="address"
                       name="address"
                       placeholder="Город, улица, дом, квартира"
                       required>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Телефон</label>
                <input type="tel"
                       class="form-control"
                       id="phone"
                       name="phone"
                       placeholder="+7 (999) 000-00-00"
                       required>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="deliveryDate" class="form-label">Дата доставки</label>
                    <input type="date"
                           class="form-control"
                           id="deliveryDate"
                           name="deliveryDate"
                           required>
                </div>
                <div class="col-md-6">
                    <label for="deliveryTime" class="form-label">Время доставки</label>
                    <input type="time"
                           class="form-control"
                           id="deliveryTime"
                           name="deliveryTime"
                           required>
                </div>
            </div>

            <div class="mb-4">
                <label for="comment" class="form-label">Комментарий к заказу</label>
                <textarea class="form-control"
                          id="comment"
                          name="comment"
                          rows="3"
                          placeholder="Пожелания, код домофона и т.д."></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 auth-submit">Подтвердить заказ</button>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script src="shop.js"></script>
<script>
    requireAuth();
</script>
</body>
</html>
