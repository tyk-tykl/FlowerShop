<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — FlowerShop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a href="index.html">
                <img src="img/logo.jpg"
                     class="img-fluid rounded navbar-brand"
                     alt="Logo"
                     style="height: 100px;">
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>

                <span id="nav-user-name" class="nav-user-name me-2" hidden></span>
                <a id="nav-login-btn" href="login.html" class="btn btn-outline-primary me-2">Login</a>
                <a id="nav-profile-link" href="profile.html" class="ms-3 text-dark nav-icon-link" aria-label="Профиль">
                    <i class="bi bi-person-circle"></i>
                </a>
            </div>
        </div>
    </nav>
</header>

<main class="profile-page">
    <div class="container profile-container">
        <div class="profile-header">
            <div>
                <h1 class="profile-title">Личный кабинет</h1>
                <p class="profile-greeting">Здравствуйте, <span id="profile-name">—</span></p>
                <p class="profile-email text-muted mb-0"><span id="profile-email">—</span></p>
            </div>
            <button type="button" id="profile-logout" class="btn btn-outline-primary">
                Выйти
            </button>
        </div>

        <ul class="profile-tabs" role="tablist">
            <li>
                <button type="button" class="profile-tab active" data-profile-tab="favorites">
                    <i class="bi bi-heart"></i> Избранное
                </button>
            </li>
            <li>
                <button type="button" class="profile-tab" data-profile-tab="delivery">
                    <i class="bi bi-truck"></i> Доставка
                </button>
            </li>
        </ul>

        <section class="profile-panel active" data-profile-panel="favorites">
            <div id="profile-favorites-list" class="profile-favorites-list"></div>
        </section>

        <section class="profile-panel" data-profile-panel="delivery">
            <div id="profile-orders-list" class="profile-orders-list"></div>
        </section>

        <a href="index.html" class="auth-back">
            <i class="bi bi-arrow-left"></i> На главную
        </a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script src="shop.js"></script>
<script>
    requireAuth();
</script>
</body>
</html>
